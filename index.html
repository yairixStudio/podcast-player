<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>חן ליברמן וישי שנרב — כאן ב׳</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Heebo', sans-serif;
      background: #121212;
      color: #fff;
      overflow: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      background: url('photo_130.jpg') center center / cover no-repeat;
      filter: blur(40px) brightness(0.35) saturate(1.4);
      transform: scale(1.08);
      z-index: 0;
    }

    .stage {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px 40px;
    }

    /* Album art */
    .art-wrap {
      width: min(280px, 72vw);
      aspect-ratio: 1;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 32px 64px rgba(0,0,0,0.7);
      margin-bottom: 32px;
      flex-shrink: 0;
    }
    .art-wrap img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }

    /* Info */
    .info {
      width: 100%; max-width: 360px;
      display: flex; flex-direction: column; gap: 4px;
      margin-bottom: 24px;
    }
    .title   { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
    .subtitle{ font-size: 14px; font-weight: 400; color: rgba(255,255,255,0.6); }

    /* Progress */
    .progress-section {
      width: 100%; max-width: 360px;
      margin-bottom: 24px;
      /* force LTR so bar always fills left→right */
      direction: ltr;
    }
    .progress-track {
      position: relative;
      height: 5px;
      background: rgba(255,255,255,0.2);
      border-radius: 3px;
      cursor: pointer;
      user-select: none;
    }
    .progress-track:hover { height: 7px; }
    .progress-track:hover .progress-thumb { opacity: 1; }
    .progress-fill {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      background: #1db954;
      border-radius: 3px;
      pointer-events: none;
      width: 0%;
    }
    .progress-thumb {
      position: absolute;
      top: 50%; left: 0%;
      width: 14px; height: 14px;
      background: #fff;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.5);
    }
    .time-row {
      display: flex; justify-content: space-between;
      margin-top: 8px;
      font-size: 11px; color: rgba(255,255,255,0.5);
    }

    /* Controls */
    .controls {
      display: flex;
      align-items: center; justify-content: center;
      gap: 32px;
    }
    .btn {
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,0.7);
      display: flex; align-items: center; justify-content: center;
      transition: color 0.15s, transform 0.1s;
      padding: 0;
    }
    .btn:hover { color: #fff; transform: scale(1.1); }
    .btn-play {
      width: 58px; height: 58px;
      background: #fff; color: #000 !important;
      border-radius: 50%;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .btn-play:hover { background: #e8e8e8; transform: scale(1.06); }

    .brand {
      position: fixed; bottom: 14px; left: 50%;
      transform: translateX(-50%);
      font-size: 11px; color: rgba(255,255,255,0.25);
      letter-spacing: 0.5px; z-index: 2; white-space: nowrap;
    }

    @media (max-height: 580px) {
      .art-wrap { width: min(160px, 40vw); margin-bottom: 16px; }
      .controls { gap: 22px; }
    }
  </style>
</head>
<body>

<div class="bg"></div>

<div class="stage">
  <div class="art-wrap">
    <img src="photo_130.jpg" alt="חן ליברמן וישי שנרב" />
  </div>

  <div class="info">
    <div class="title">חן ליברמן וישי שנרב</div>
    <div class="subtitle">כאן ב׳ &nbsp;·&nbsp; 23 באפריל 2026</div>
  </div>

  <div class="progress-section">
    <div class="progress-track" id="track">
      <div class="progress-fill"  id="fill"></div>
      <div class="progress-thumb" id="thumb"></div>
    </div>
    <div class="time-row">
      <span id="timeNow">0:00</span>
      <span id="timeTot">0:00</span>
    </div>
  </div>

  <div class="controls">
    <!-- rewind 15s -->
    <button class="btn" id="btnRew" aria-label="15 שניות אחורה">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
        <path d="M11.99 5V2l-4 3.99 4 4.01V6.99c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8.01-8z"/>
        <text x="12" y="15.5" font-size="5.2" font-family="Arial,sans-serif" font-weight="bold" text-anchor="middle" fill="currentColor">15</text>
      </svg>
    </button>

    <!-- play/pause -->
    <button class="btn btn-play" id="btnPlay" aria-label="נגן">
      <svg id="iconPlay" width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
        <path d="M8 5v14l11-7z"/>
      </svg>
      <svg id="iconPause" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" style="display:none">
        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
      </svg>
    </button>

    <!-- forward 15s -->
    <button class="btn" id="btnFwd" aria-label="15 שניות קדימה">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 5V2l4 3.99-4 4.01V6.99c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/>
        <text x="12" y="15.5" font-size="5.2" font-family="Arial,sans-serif" font-weight="bold" text-anchor="middle" fill="currentColor">15</text>
      </svg>
    </button>
  </div>
</div>

<div class="brand">כאן ב׳</div>

<audio id="audio" preload="auto" src="audio.mp3"></audio>

<script>
  const audio     = document.getElementById('audio');
  const btnPlay   = document.getElementById('btnPlay');
  const iconPlay  = document.getElementById('iconPlay');
  const iconPause = document.getElementById('iconPause');
  const btnRew    = document.getElementById('btnRew');
  const btnFwd    = document.getElementById('btnFwd');
  const track     = document.getElementById('track');
  const fill      = document.getElementById('fill');
  const thumb     = document.getElementById('thumb');
  const timeNow   = document.getElementById('timeNow');
  const timeTot   = document.getElementById('timeTot');

  /* ── helpers ── */
  function fmt(s) {
    s = Math.max(0, Math.floor(s || 0));
    return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
  }

  function getPct(clientX) {
    const r = track.getBoundingClientRect();
    return Math.max(0, Math.min(1, (clientX - r.left) / r.width));
  }

  function applyPct(pct) {
    fill.style.width   = (pct * 100) + '%';
    thumb.style.left   = (pct * 100) + '%';
    timeNow.textContent = fmt((pct * (audio.duration || 0)));
  }

  function setPlaying(p) {
    iconPlay.style.display  = p ? 'none' : '';
    iconPause.style.display = p ? '' : 'none';
  }

  /* ── audio events ── */
  audio.addEventListener('play',  () => setPlaying(true));
  audio.addEventListener('pause', () => setPlaying(false));
  audio.addEventListener('ended', () => setPlaying(false));

  audio.addEventListener('loadedmetadata', () => {
    timeTot.textContent = fmt(audio.duration);
  });

  audio.addEventListener('timeupdate', () => {
    if (!dragging && audio.duration) {
      applyPct(audio.currentTime / audio.duration);
    }
    timeNow.textContent = fmt(audio.currentTime);
    timeTot.textContent = fmt(audio.duration);
  });

  /* ── controls ── */
  btnPlay.addEventListener('click', () => audio.paused ? audio.play() : audio.pause());
  btnRew.addEventListener('click',  () => { audio.currentTime = Math.max(0, audio.currentTime - 15); });
  btnFwd.addEventListener('click',  () => { audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 15); });

  /* ── seek: click + drag (mouse + touch) ── */
  let dragging = false;

  function seekTo(pct) {
    if (audio.duration) {
      audio.currentTime = pct * audio.duration;
    }
    applyPct(pct);
  }

  // Mouse
  track.addEventListener('mousedown', e => {
    dragging = true;
    applyPct(getPct(e.clientX));
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (dragging) applyPct(getPct(e.clientX));
  });
  document.addEventListener('mouseup', e => {
    if (dragging) {
      seekTo(getPct(e.clientX));
      dragging = false;
    }
  });

  // Touch
  track.addEventListener('touchstart', e => {
    dragging = true;
    applyPct(getPct(e.touches[0].clientX));
    e.preventDefault();
  }, { passive: false });
  document.addEventListener('touchmove', e => {
    if (dragging) applyPct(getPct(e.touches[0].clientX));
  }, { passive: true });
  document.addEventListener('touchend', e => {
    if (dragging) {
      seekTo(getPct(e.changedTouches[0].clientX));
      dragging = false;
    }
  });

  /* ── keyboard ── */
  document.addEventListener('keydown', e => {
    if (e.code === 'Space')      { e.preventDefault(); btnPlay.click(); }
    if (e.code === 'ArrowLeft')  audio.currentTime = Math.max(0, audio.currentTime - 15);
    if (e.code === 'ArrowRight') audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 15);
  });
</script>
</body>
</html>
