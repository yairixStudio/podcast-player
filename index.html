<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>חן ליברמן וישי שנרב — כאן ב׳</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Heebo', sans-serif;
      background: #121212;
      color: #fff;
      overflow: hidden;
    }

    /* ── Background ── */
    .bg {
      position: fixed;
      inset: 0;
      background: url('photo_130.jpg') center center / cover no-repeat;
      filter: blur(40px) brightness(0.35) saturate(1.4);
      transform: scale(1.08);
      z-index: 0;
    }

    /* ── Layout ── */
    .stage {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px 32px;
    }

    /* ── Album art ── */
    .art-wrap {
      width: min(280px, 72vw);
      aspect-ratio: 1;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 32px 64px rgba(0,0,0,0.7);
      margin-bottom: 32px;
      flex-shrink: 0;
    }
    .art-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── Info ── */
    .info {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 22px;
    }
    .title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
      line-height: 1.2;
      color: #fff;
    }
    .subtitle {
      font-size: 14px;
      font-weight: 400;
      color: rgba(255,255,255,0.6);
    }

    /* ── Progress ── */
    .progress-section {
      width: 100%;
      max-width: 360px;
      margin-bottom: 18px;
    }
    .progress-bar-wrap {
      position: relative;
      height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      cursor: pointer;
      transition: height 0.15s;
    }
    .progress-bar-wrap:hover { height: 6px; }
    .progress-fill {
      position: absolute;
      top: 0; left: 0;
      height: 100%;
      background: #1db954;
      border-radius: 2px;
      pointer-events: none;
    }
    .progress-thumb {
      position: absolute;
      top: 50%;
      width: 12px;
      height: 12px;
      background: #fff;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      transform: translateY(-50%);
    }
    .progress-bar-wrap:hover .progress-thumb { opacity: 1; }
    .time-row {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 11px;
      color: rgba(255,255,255,0.5);
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
      margin-bottom: 28px;
    }
    .btn {
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(255,255,255,0.7);
      padding: 4px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, transform 0.1s;
    }
    .btn:hover { color: #fff; transform: scale(1.1); }
    .btn-play {
      width: 56px;
      height: 56px;
      background: #fff;
      color: #000 !important;
      border-radius: 50%;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .btn-play:hover { background: #e8e8e8; transform: scale(1.06); }

    /* ── Volume ── */
    .volume-row {
      width: 100%;
      max-width: 360px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .volume-row .vol-icon { color: rgba(255,255,255,0.6); flex-shrink: 0; }
    .vol-bar-wrap {
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      cursor: pointer;
      position: relative;
    }
    .vol-fill {
      position: absolute;
      top: 0; left: 0;
      height: 100%;
      background: rgba(255,255,255,0.6);
      border-radius: 2px;
      pointer-events: none;
    }

    /* ── Branding ── */
    .brand {
      position: fixed;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.5px;
      z-index: 2;
      white-space: nowrap;
    }

    @media (max-height: 580px) {
      .art-wrap { width: min(160px, 40vw); margin-bottom: 16px; }
      .controls { gap: 20px; margin-bottom: 14px; }
    }
  </style>
</head>
<body>

<div class="bg"></div>

<div class="stage">

  <div class="art-wrap">
    <img src="photo_130.jpg" alt="חן ליברמן וישי שנרב" />
  </div>

  <div class="info">
    <div class="title">חן ליברמן וישי שנרב</div>
    <div class="subtitle">כאן ב׳ &nbsp;·&nbsp; 23 באפריל 2026</div>
  </div>

  <div class="progress-section">
    <div class="progress-bar-wrap" id="progressBar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
      <div class="progress-thumb" id="progressThumb" style="right:100%"></div>
    </div>
    <div class="time-row">
      <span id="timeNow">0:00</span>
      <span id="timeTot">0:00</span>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="btnRew" aria-label="15 שניות אחורה">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
        <path d="M11.99 5V2l-4 3.99 4 4.01V6.99c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8.01-8z"/>
        <text x="9" y="15" font-size="5" font-family="Arial,sans-serif" font-weight="bold" text-anchor="middle" fill="currentColor">15</text>
      </svg>
    </button>

    <button class="btn btn-play" id="btnPlay" aria-label="נגן">
      <svg id="iconPlay" width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
        <path d="M8 5v14l11-7z"/>
      </svg>
      <svg id="iconPause" width="26" height="26" viewBox="0 0 24 24" fill="currentColor" style="display:none">
        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
      </svg>
    </button>

    <button class="btn" id="btnFwd" aria-label="15 שניות קדימה">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 5v-3l4 4-4 4V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/>
        <text x="15" y="15" font-size="5" font-family="Arial,sans-serif" font-weight="bold" text-anchor="middle" fill="currentColor">15</text>
      </svg>
    </button>
  </div>

  <div class="volume-row">
    <svg class="vol-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
      <path d="M18.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM5 9v6h4l5 5V4L9 9H5z"/>
    </svg>
    <div class="vol-bar-wrap" id="volBar">
      <div class="vol-fill" id="volFill" style="width:80%"></div>
    </div>
    <svg class="vol-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
      <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
    </svg>
  </div>

</div>

<div class="brand">כאן ב׳</div>

<audio id="audio" preload="auto" src="audio.mp3"></audio>

<script>
  const audio    = document.getElementById('audio');
  const btnPlay  = document.getElementById('btnPlay');
  const iconPlay = document.getElementById('iconPlay');
  const iconPause= document.getElementById('iconPause');
  const btnRew   = document.getElementById('btnRew');
  const btnFwd   = document.getElementById('btnFwd');
  const pBar     = document.getElementById('progressBar');
  const pFill    = document.getElementById('progressFill');
  const pThumb   = document.getElementById('progressThumb');
  const timeNow  = document.getElementById('timeNow');
  const timeTot  = document.getElementById('timeTot');
  const volBar   = document.getElementById('volBar');
  const volFill  = document.getElementById('volFill');

  function fmt(s) {
    s = Math.max(0, Math.floor(s || 0));
    return Math.floor(s/60) + ':' + String(s%60).padStart(2,'0');
  }

  function setPlaying(p) {
    iconPlay.style.display  = p ? 'none' : '';
    iconPause.style.display = p ? '' : 'none';
  }

  function updateBar() {
    if (!audio.duration) return;
    const pct = audio.currentTime / audio.duration;
    pFill.style.width  = (pct * 100) + '%';
    // RTL: thumb at right side; 0% = right, 100% = left
    pThumb.style.right = ((1 - pct) * 100) + '%';
    timeNow.textContent = fmt(audio.currentTime);
    timeTot.textContent = fmt(audio.duration);
  }

  btnPlay.addEventListener('click', () => audio.paused ? audio.play() : audio.pause());
  btnRew.addEventListener('click',  () => { audio.currentTime = Math.max(0, audio.currentTime - 15); });
  btnFwd.addEventListener('click',  () => { audio.currentTime = Math.min(audio.duration||0, audio.currentTime + 15); });

  audio.addEventListener('play',           () => setPlaying(true));
  audio.addEventListener('pause',          () => setPlaying(false));
  audio.addEventListener('ended',          () => setPlaying(false));
  audio.addEventListener('timeupdate',     updateBar);
  audio.addEventListener('loadedmetadata', () => { timeTot.textContent = fmt(audio.duration); });

  // Seek on progress bar click (RTL: right = start)
  pBar.addEventListener('click', e => {
    const r = pBar.getBoundingClientRect();
    const frac = 1 - (e.clientX - r.left) / r.width;
    if (audio.duration) audio.currentTime = frac * audio.duration;
  });

  // Volume
  audio.volume = 0.8;
  volBar.addEventListener('click', e => {
    const r = volBar.getBoundingClientRect();
    audio.volume = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
    volFill.style.width = (audio.volume * 100) + '%';
  });

  // Keyboard
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.code === 'Space')      { e.preventDefault(); btnPlay.click(); }
    if (e.code === 'ArrowRight') audio.currentTime = Math.max(0, audio.currentTime - 15);
    if (e.code === 'ArrowLeft')  audio.currentTime = Math.min(audio.duration||0, audio.currentTime + 15);
  });
</script>
</body>
</html>
